<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roxanne Glam – Feedback</title>
  <link rel="stylesheet" href="feedback.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ─── NAV ─── -->
  <header class="nav">
    <a href="#" class="logo">Roxanne Glam</a>
    <nav class="nav__links">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="shop.html">Shop</a>
      <a href="blog.html">Beauty Blog</a>
      <a href="feedback.html" class="active">Feedback</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <!-- Left: Form -->
    <section class="form-wrap">
      <div class="form-header">
        <h1><span class="dash">—</span> Feedback <span class="dash">—</span></h1>
        <p>We value your feedback! Please fill out the form below to<br>share your experience and help us improve.</p>
      </div>

      <form class="feedback-form" onsubmit="return false;">

        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Your email" autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
        </div>

        <div class="form-group">
          <label>Rating</label>
          <div class="stars" role="group" aria-label="Star rating">
            <button type="button" class="star" data-val="1" aria-label="1 star">☆</button>
            <button type="button" class="star" data-val="2" aria-label="2 stars">☆</button>
            <button type="button" class="star" data-val="3" aria-label="3 stars">☆</button>
            <button type="button" class="star" data-val="4" aria-label="4 stars">☆</button>
            <button type="button" class="star" data-val="5" aria-label="5 stars">☆</button>
          </div>
        </div>

        <button type="submit" class="btn-submit">Submit Feedback</button>

      </form>
    </section>

    <!-- Right: Decorative image -->
    <aside class="form-visual" aria-hidden="true">
      <div class="visual-blob"></div>
      <img
        src="https://images.unsplash.com/photo-1631214500152-6e7ee6393d1e?w=500&q=80"
        alt="Pink cosmetics arrangement"
        class="visual-img"
      />
    </aside>

  </main>

  <!-- ─── FOOTER ─── -->
  <footer class="footer">
    <div class="footer__socials">
      <a href="#" aria-label="Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="#" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a href="#" aria-label="TikTok">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.85a8.27 8.27 0 0 0 4.84 1.55V6.94a4.86 4.86 0 0 1-1.07-.25z"/></svg>
      </a>
    </div>
    <div class="footer__links">
      <a href="#">Copyright</a>
      <a href="#">Legal</a>
      <a href="#">Privacy</a>
    </div>
    <p class="footer__copy">© 2024 Roxanne Glam. All rights reserved.</p>
  </footer>

  <script>
    /* ── Star Rating ── */
    const stars = document.querySelectorAll('.star');
    let selected = 0;

    stars.forEach(star => {
      star.addEventListener('mouseenter', () => highlight(+star.dataset.val));
      star.addEventListener('mouseleave', () => highlight(selected));
      star.addEventListener('click', () => {
        selected = +star.dataset.val;
        highlight(selected);
      });
    });

    function highlight(val) {
      stars.forEach(s => {
        s.textContent = +s.dataset.val <= val ? '★' : '☆';
        s.classList.toggle('filled', +s.dataset.val <= val);
      });
    }
  </script>

</body>
</html>
